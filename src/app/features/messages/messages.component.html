<div
  class="bg-light dark:bg-background-dark text-slate-900 dark:text-slate-100"
>
  <div class="flex h-screen overflow-hidden">
    <app-sidebar></app-sidebar>

    <main class="flex-1 flex flex-col overflow-hidden">
      <!-- Header -->
      <header
        class="h-20 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-8 shrink-0"
      >
        <div>
          <h2
            class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white"
          >
            Parent Communications
          </h2>
          <p class="text-sm text-slate-500">
            Manage interactions and updates with parents
          </p>
        </div>
      </header>

      <!-- Search Bar -->
      <div
        class="px-8 py-4 bg-white dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-800 flex flex-wrap items-center gap-4 shrink-0"
      >
        <div class="relative flex-1 max-w-md">
          <span
            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl leading-none"
            >search</span
          >
          <input
            class="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-xl pl-10 pr-4 py-2.5 text-sm focus:ring-2 focus:ring-primary transition-all"
            placeholder="Search parents or children..."
            type="text"
            [(ngModel)]="searchQuery"
            (input)="onSearch()"
          />
        </div>
      </div>

      <!-- Messages List -->
      <div
        class="flex-1 overflow-y-auto bg-slate-50/50 dark:bg-background-dark/30"
      >
        <div class="max-w-6xl mx-auto px-8 py-6 space-y-3">
          <!-- Loading -->
          <div *ngIf="isLoading" class="flex justify-center py-20">
            <span
              class="material-symbols-outlined animate-spin text-primary text-4xl"
              >progress_activity</span
            >
          </div>

          <!-- Empty State -->
          <div
            *ngIf="!isLoading && filteredParents.length === 0"
            class="text-center py-20 text-slate-400"
          >
            <span class="material-symbols-outlined text-5xl mb-2">inbox</span>
            <p class="text-sm">No parents found</p>
          </div>

          <!-- Parent Items -->
          <div
            *ngFor="let parent of filteredParents"
            (click)="openChat(parent)"
            class="flex items-center gap-4 p-4 bg-white dark:bg-slate-900 rounded-xl border-l-4 border-l-primary shadow-sm hover:shadow-md transition-all group cursor-pointer"
          >
            <!-- Avatar -->
            <div class="relative shrink-0">
              <div
                class="h-14 w-14 rounded-full bg-primary/20 flex items-center justify-center text-primary font-bold text-lg"
              >
                {{ getInitials(parent.name) }}
              </div>
              <span
                class="absolute bottom-0 right-0 block h-3.5 w-3.5 rounded-full bg-green-500 border-2 border-white dark:border-slate-900"
              ></span>
            </div>

            <!-- Info -->
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between mb-0.5">
                <h4
                  class="text-base font-bold text-slate-900 dark:text-white group-hover:text-primary transition-colors"
                >
                  {{ parent.name }}
                </h4>
              </div>
              <p
                class="text-xs text-primary font-semibold mb-1 uppercase tracking-tight"
              >
                Child: {{ getFirstChildName(parent) }}
              </p>
              <p class="text-sm text-slate-500 dark:text-slate-400 truncate">
                Click to open conversation
              </p>
            </div>

            <div class="flex flex-col items-center gap-2 px-2">
              <span
                class="material-symbols-outlined text-slate-300 group-hover:text-primary transition-colors"
                >chevron_right</span
              >
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
