<div
  class="bg-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen"
>
  <div class="flex h-screen overflow-hidden">
    <!-- Sidebar Navigation -->
    <app-sidebar></app-sidebar>
    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden">
      <!-- Header -->
      <header
        class="bg-white dark:bg-slate-900 border-bottom border-slate-200 dark:border-slate-800 px-8 py-6 flex flex-col gap-6"
      >
        <div
          class="flex flex-col md:flex-row md:items-center justify-between gap-4"
        >
          <div>
            <h2 class="text-2xl font-bold text-slate-900 dark:text-white">
              My Patients
            </h2>
            <p class="text-sm text-slate-500">
              Manage and track children profiles and therapy progress
            </p>
          </div>
        </div>

        <div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar">
          <span
            class="px-3 py-1 bg-primary text-white rounded-full text-xs font-semibold cursor-pointer whitespace-nowrap"
            >All Patients
          </span>
        </div>
      </header>
      <!-- Patient Grid -->
      <div
        class="flex-1 overflow-y-auto p-8 bg-slate-50 dark:bg-background-dark/50"
      >
        <div
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"
        >
          <!-- !! Patient Card 1 -->
          @for (parent of Parents; track parent.id) {
            @for (child of parent.children; track child.id) {
              <div
                class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl overflow-hidden group hover:shadow-md transition-shadow"
              >
                <div class="p-5">
                  <div class="flex justify-between items-start mb-4">
                    <div
                      class="w-14 h-14 rounded-full bg-indigo-100 dark:bg-indigo-900/30 flex items-center justify-center text-indigo-600 dark:text-indigo-400 font-bold text-xl"
                    >
                      {{ child.name[0] }}
                    </div>
                    <span
                      class="bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400 px-2 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider"
                      >Active</span
                    >
                  </div>
                  <div>
                    <h3
                      class="font-bold text-slate-900 dark:text-white group-hover:text-primary transition-colors"
                    >
                      {{ child.name }}
                    </h3>
                    <p class="text-xs text-slate-500 mb-3">
                      {{ child.age }} years old
                    </p>
                    <p
                      class="text-sm text-slate-600 dark:text-slate-400 line-clamp-2"
                    >
                      {{ child.description }}
                    </p>
                  </div>
                </div>
                <!-- track progress btn -->
                <div
                  class="px-5 py-4 border-t border-slate-100 dark:border-slate-800 flex gap-2 bg-slate-50/50 dark:bg-slate-800/20"
                >
                  <a
                    (click)="trackProgress(child.id)"
                    class="flex-1 bg-primary text-white py-2 rounded-lg text-xs font-bold text-center hover:bg-primary/90 transition-all"
                    routerLink="patientsdetails"
                    >Track Progress</a
                  >
                </div>
              </div>
            }
          }
